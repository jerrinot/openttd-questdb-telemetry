; OpenTTD configuration for the QuestDB telemetry demo.
;
; Use it WITHOUT clobbering your own config:
;     openttd -D -c config/demo.cfg -x
;   -D  run as a dedicated server (the admin port only exists on a server)
;   -c  use this config file
;   -x  do not overwrite this file on exit
;
; Content (the GameScript and AIs) is still loaded from the normal OpenTTD
; data directory (~/.local/share/openttd). Install the GameScript first with
; scripts/install_gamescript.sh, and make sure at least one AI is downloaded.

[network]
; The admin port the Rust bridge connects to.
server_admin_port = 3977
admin_password = questdb
; Allow the simple password login the bridge uses (no key exchange).
allow_insecure_admin_login = true
server_name = QuestDB Telemetry Demo
; 0 = local only; the server is not advertised publicly.
server_game_type = 0
autoclean_companies = false

[difficulty]
; Number of AI competitors. They build the networks and run the vehicles that
; produce telemetry. REQUIRES at least one AI to be installed, otherwise OpenTTD
; aborts when trying to pick a random AI.
max_no_competitors = 6
; Minutes between adding competitors (they ramp up over the first few minutes).
competitors_interval = 1
number_towns = 3
industry_density = 4

[ai]
; AIs are disabled in network games by default; a dedicated server is a network
; game, so we must explicitly allow them.
ai_in_multiplayer = true

[game_creation]
; 8 => 256x256, 9 => 512x512. Smaller maps fill with vehicles faster.
map_x = 8
map_y = 8
landscape = temperate
starting_year = 1960

[gui]
; Faster autosave isn't needed; keep it modest on a long-running server.
autosave = monthly

; The GameScript that emits telemetry. The key MUST equal info.nut GetName().
[game_scripts]
QuestDBTelemetry =

; Leave AI slots unassigned -> OpenTTD fills them with random installed AIs.
[ai_players]
none =
none =
none =
none =
none =
none =
none =
none =
