; OpenTTD config for OBSERVER mode: you spectate while several AIs build
; companies, and the telemetry streams to QuestDB.
;
;     openttd -c config/observe.cfg -x
;
; ALWAYS pass -x (keeps admin_password in this file; see play.cfg notes).
;
; Then in OpenTTD:
;   Multiplayer -> New Game (host a server — required for the admin port).
;   When the game opens you start as a SPECTATOR; do NOT found a company.
;   The AIs found companies automatically (max_no_competitors below) and you
;   watch the map fill while the dashboards update.
;
; Requires at least one AI installed (Online Content). If the AIs don't appear,
; open AI/Game Script Settings in the GUI and add a few AI players manually.

[network]
server_admin_port = 3977
admin_password = questdb
allow_insecure_admin_login = true
server_name = QuestDB Telemetry (observe)
server_game_type = 0
autoclean_companies = false

[difficulty]
; Several AI competitors building companies for you to watch.
max_no_competitors = 6
; Minutes between adding competitors — small so they ramp up quickly.
competitors_interval = 1
number_towns = 3
industry_density = 4

[ai]
; AIs are off in network games by default; a hosted game is a network game.
ai_in_multiplayer = true

[game_creation]
map_x = 9
map_y = 9
landscape = temperate
starting_year = 1960

[game_scripts]
QuestDBTelemetry =

[ai_players]
none =
none =
none =
none =
none =
none =
