; OpenTTD config for playing the demo yourself in the GUI (not dedicated).
;
; Launch the game with this config so the admin port + GameScript are enabled
; WITHOUT touching your own ~/.config/openttd/openttd.cfg:
;
;     openttd -c config/play.cfg -x
;
; ALWAYS pass -x. admin_password is a "secret" setting that OpenTTD otherwise
; strips out of this file on exit (and the admin port then won't open). -x also
; stops OpenTTD from rewriting this file with your personal settings.
;
; Then in OpenTTD: Multiplayer -> New Game (you MUST host a server; the admin
; port the bridge reads does not exist in single-player). Build some vehicles
; and watch the Grafana dashboards fill.

[network]
; The admin port the Rust bridge connects to.
server_admin_port = 3977
admin_password = questdb
allow_insecure_admin_login = true
server_name = QuestDB Telemetry (play)
; 0 = local only; not advertised publicly.
server_game_type = 0
autoclean_companies = false

[difficulty]
; No AI competitors by default -- you build the vehicles. To let AIs build them
; instead, download an AI via "Check Online Content" and raise this to e.g. 4.
max_no_competitors = 0

[ai]
ai_in_multiplayer = true

[game_creation]
map_x = 8
map_y = 8
landscape = temperate
starting_year = 1960

; The telemetry GameScript. The key MUST equal info.nut GetName().
[game_scripts]
QuestDBTelemetry =

[ai_players]
none =
none =
none =
none =
none =
none =
none =
none =
